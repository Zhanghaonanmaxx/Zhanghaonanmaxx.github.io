<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>查看自己头像 - 全局点击退出版</title>
    <style>
        :root {
            --ios-blue: #007AFF;
            --ios-bg: #F2F2F7;
            --ios-red: #FF3B30;
        }

        body {
            margin: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background-color: #1c1c1e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica;
            touch-action: none;
        }

        .phone-mockup {
            width: 375px; height: 780px; background: #000;
            border-radius: 50px; border: 10px solid #333;
            box-shadow: 0 50px 100px rgba(0,0,0,0.6);
            position: relative; overflow: hidden;
        }

        .notch {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 160px; height: 34px; background: #000;
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 10000;
        }

        .screen { width: 100%; height: 100%; background-color: var(--ios-bg); position: relative; overflow: hidden; }

        .nav-bar {
            height: 94px; background: #fff; display: flex; align-items: flex-end;
            justify-content: center; padding-bottom: 12px; border-bottom: 0.5px solid #c8c7cc;
            font-weight: 600; font-size: 17px; box-sizing: border-box;
        }
        .back-btn { position: absolute; left: 16px; bottom: 12px; color: var(--ios-blue); font-size: 24px; }

        .profile-content { display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
        .avatar-box { position: relative; width: 110px; height: 110px; margin-bottom: 35px; cursor: pointer; }
        .main-avatar { width: 100%; height: 100%; border-radius: 24px; object-fit: cover; background: #eee; }

        .list-group { width: 343px; background: #fff; border-radius: 12px; overflow: hidden; }
        .list-item { padding: 16px; border-bottom: 0.5px solid #f0f0f0; display: flex; justify-content: space-between; font-size: 16px; }
        .list-item .value { color: #8e8e93; }

        /* 大图查看层 */
        #viewer-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0); display: none; z-index: 2000;
            transition: background 0.35s ease; align-items: center; justify-content: center;
            cursor: pointer; /* 提示可点击 */
        }
        #viewer-overlay.active { background: rgba(0,0,0,1); }

        .viewer-header {
            position: absolute; top: 50px; width: 100%; padding: 0 20px;
            display: flex; justify-content: space-between; color: #fff;
            font-size: 17px; z-index: 2100; opacity: 0; transition: opacity 0.3s;
            box-sizing: border-box;
        }

        #img-container {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            overflow: hidden; pointer-events: none;
        }

        #viewer-img {
            width: 110px; height: 110px; object-fit: cover; border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2050; pointer-events: auto;
            transform-origin: center center;
            aspect-ratio: 1/1;
        }

        /* 菜单样式 */
        .mask { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0); display: none; z-index: 3000; transition: background 0.3s; }
        .sheet { position: absolute; bottom: -100%; left: 0; width: 100%; z-index: 3100; transition: bottom 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); padding-bottom: 24px; }
        .sheet-box { margin: 0 10px 10px; background: rgba(255,255,255,0.85); backdrop-filter: blur(25px); border-radius: 14px; overflow: hidden; }
        .btn { padding: 18px; text-align: center; color: var(--ios-blue); font-size: 20px; border-bottom: 0.5px solid rgba(0,0,0,0.1); cursor: pointer; }
        .cancel-btn { font-weight: 600; }
    </style>
</head>
<body>

    <div class="phone-mockup">
        <div class="notch"></div>
        <div class="screen">
            <div class="nav-bar"><span class="back-btn">‹</span>编辑资料</div>
            <div class="profile-content">
                <div class="avatar-box" onclick="openFullView()">
                    <img id="my-avatar" class="main-avatar" src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=800&q=80">
                </div>
                <div class="list-group">
                    <div class="list-item"><span>名字</span><span class="value">xxx</span></div>
                    <div class="list-item"><span>用户名</span><span class="value">xxx</span></div>
                    <div class="list-item"><span>手机号</span><span class="value">xxx</span></div>
                </div>
            </div>

            <div id="viewer-overlay" onclick="handleOverlayClick(event)">
                <div class="viewer-header" id="v-header">
                    <span onclick="closeFullView()">取消</span>
                    <span style="font-weight: 600;" onclick="openMenu(event)">更改头像</span>
                </div>
                <div id="img-container">
                    <img id="viewer-img" draggable="false">
                </div>
            </div>

            <div class="mask" id="sheet-mask" onclick="closeMenu()"></div>
            <div class="sheet" id="action-sheet">
                <div class="sheet-box">
                    <div class="btn" onclick="closeMenu()">相册</div>
                    <div class="btn" onclick="closeMenu()">拍摄</div>
                </div>
                <div class="sheet-box"><div class="btn cancel-btn" onclick="closeMenu()">取消</div></div>
            </div>
        </div>
    </div>

    <script>
        const myAvatar = document.getElementById('my-avatar');
        const overlay = document.getElementById('viewer-overlay');
        const viewerImg = document.getElementById('viewer-img');
        const header = document.getElementById('v-header');
        const sheet = document.getElementById('action-sheet');
        const mask = document.getElementById('sheet-mask');

        let scale = 1;
        let lastScale = 1;
        let startDist = 0;
        let isViewing = false;

        function openFullView() {
            const rect = myAvatar.getBoundingClientRect();
            const parentRect = document.querySelector('.screen').getBoundingClientRect();
            
            scale = 1;
            lastScale = 1;
            viewerImg.style.transform = `scale(1)`;
            viewerImg.src = myAvatar.src;
            viewerImg.style.position = 'absolute';
            viewerImg.style.top = (rect.top - parentRect.top) + 'px';
            viewerImg.style.left = (rect.left - parentRect.left) + 'px';
            viewerImg.style.width = rect.width + 'px';
            viewerImg.style.height = rect.height + 'px';
            viewerImg.style.borderRadius = '24px';

            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.classList.add('active');
                header.style.opacity = '1';
                viewerImg.style.top = '200px'; 
                viewerImg.style.left = '0px';
                viewerImg.style.width = '375px';
                viewerImg.style.height = '375px';
                viewerImg.style.borderRadius = '0px';
                isViewing = true;
            }, 15);
        }

        function closeFullView() {
            if(!isViewing) return;
            const rect = myAvatar.getBoundingClientRect();
            const parentRect = document.querySelector('.screen').getBoundingClientRect();
            
            isViewing = false;
            header.style.opacity = '0';
            overlay.classList.remove('active');
            viewerImg.style.transform = `scale(1)`;

            viewerImg.style.top = (rect.top - parentRect.top) + 'px';
            viewerImg.style.left = (rect.left - parentRect.left) + 'px';
            viewerImg.style.width = rect.width + 'px';
            viewerImg.style.height = rect.height + 'px';
            viewerImg.style.borderRadius = '24px';

            setTimeout(() => { overlay.style.display = 'none'; }, 400);
        }

        // 修改后的点击处理逻辑
        function handleOverlayClick(e) {
            // 只要不是正在进行双指缩放，点击任何位置都关闭
            if (scale === 1) {
                closeFullView();
            } else {
                // 如果图片被放大了，点击则重置回 1 倍，再次点击才关闭（符合iOS逻辑）
                scale = 1;
                lastScale = 1;
                viewerImg.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
                viewerImg.style.transform = `scale(1)`;
            }
        }

        function openMenu(e) { 
            e.stopPropagation(); // 阻止点击事件冒泡到 overlay，避免关闭大图
            mask.style.display = 'block'; 
            setTimeout(() => { 
                mask.style.background = 'rgba(0,0,0,0.5)'; 
                sheet.style.bottom = '10px'; 
            }, 10); 
        }

        function closeMenu() { 
            sheet.style.bottom = '-100%'; 
            mask.style.background = 'rgba(0,0,0,0)'; 
            setTimeout(() => { mask.style.display = 'none'; }, 300); 
        }

        // 手势逻辑
        viewerImg.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                startDist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
            }
        });

        viewerImg.addEventListener('touchmove', (e) => {
            if (!isViewing) return;
            if (e.touches.length === 2) {
                e.preventDefault();
                const currDist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                const zoom = currDist / startDist;
                scale = Math.min(Math.max(lastScale * zoom, 1), 3); 
                viewerImg.style.transition = 'none'; 
                viewerImg.style.transform = `scale(${scale})`;
            }
        });

        viewerImg.addEventListener('touchend', (e) => {
            lastScale = scale;
            viewerImg.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
        });
    </script>
</body>
</html>
