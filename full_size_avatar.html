<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>头像大图交互 Demo - 1:1 风景图版</title>
    <style>
        :root {
            --bg-color: #f8f4f2;
            --card-bg: #ffffff;
            --text-sub: #8e8e8e;
            --accent: #fdf2e9;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #e5e5e5;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
            /* 禁止系统默认菜单，防止意外的长按弹出 */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            /* 允许页面滚动，但交由JS处理大图手势 */
            touch-action: pan-y;
        }

        .phone-emulator {
            width: 375px; height: 812px;
            background-color: var(--bg-color);
            position: relative;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            overflow: hidden;
            border: 8px solid #333;
            box-sizing: border-box;
        }

        .status-bar { height: 44px; display: flex; justify-content: space-between; padding: 0 30px; align-items: center; font-size: 14px; font-weight: 600; box-sizing: border-box; }
        .back-icon { padding: 15px 20px; font-size: 20px; cursor: pointer; }

        .profile-card {
            background: var(--card-bg);
            margin: 60px 20px 20px;
            border-radius: 24px;
            padding: 1px 20px 20px;
            text-align: center;
        }

        .avatar-container {
            width: 100px; height: 100px;
            background: #fff;
            border-radius: 30px;
            margin: -50px auto 15px;
            overflow: hidden;
            border: 4px solid white;
            cursor: pointer;
            /* 确保容器本身是1:1 */
            aspect-ratio: 1 / 1; 
        }
        .avatar-container img { 
            width: 100%; 
            height: 100%; 
            /* 核心：确保非正方形图片在1:1容器中居中裁剪填满 */
            object-fit: cover; 
        }

        .info h2 { margin: 5px 0; font-size: 22px; }
        .info p { color: var(--text-sub); margin-bottom: 25px; font-size: 14px; }

        .actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
        .btn { background: var(--accent); border-radius: 18px; padding: 14px 0; font-size: 12px; color: #5d3a1a; font-weight: bold; text-align: center; }

        .menu-list { margin-top: 15px; text-align: left; padding: 0 5px; }
        .menu-item { padding: 16px 0; border-bottom: 1px solid #f5f5f5; display: flex; align-items: center; gap: 12px; font-size: 16px; color: #333; }
        .menu-item:last-child { border: none; }
        .menu-item i { font-style: normal; font-size: 18px; }

        /* --- 大图遮罩层 --- */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none; flex-direction: column;
            z-index: 100;
            overflow: hidden;
            /* 在全屏状态下禁止页面滚动 */
            touch-action: none;
        }

        /* 顶部导航栏 */
        .viewer-nav {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 20px 20px 0;
            z-index: 110;
            box-sizing: border-box;
        }
        .close-btn {
            color: white;
            font-size: 28px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        /* 大图图片容器 - 用于承载缩放变换 */
        #img-viewport {
            flex: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 确保容器内点击也能触发退出 */
            pointer-events: auto; 
        }

        #big-avatar {
            width: 100%;
            /* 核心：确保打开后也是1:1的正方形 */
            aspect-ratio: 1 / 1;
            max-width: 375px;
            max-height: 375px;
            object-fit: cover;
            transform: scale(1);
            will-change: transform;
            /* 允许图片接收触摸事件用于缩放 */
            pointer-events: auto; 
        }

    </style>
</head>
<body oncontextmenu="return false;">

<div class="phone-emulator" id="phone">
    <div class="status-bar"><span>11:03</span><span>📶 🔋</span></div>
    <div class="back-icon"> 〈 </div>

    <div class="profile-card">
        <div class="avatar-container" id="avatarTrigger">
            <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=800&q=80" alt="avatar">
        </div>
        <div class="info">
            <h2>xxx</h2>
            <p>@xxx</p>
        </div>
        <div class="actions">
            <div class="btn">🔔 静音</div>
            <div class="btn">📌 置顶</div>
            <div class="btn">🔍 搜索</div>
            <div class="btn">💬 聊天</div>
        </div>

        <div class="menu-list">
            <div class="menu-item"><i>🗑️</i> 清空聊天记录</div>
            <div class="menu-item"><i>🚫</i> 拉黑</div>
            <div class="menu-item"><i>💬</i> 举报</div>
            <div class="menu-item"><i>👤</i> 添加联系人</div>
        </div>
    </div>

    <div id="overlay">
        <div class="viewer-nav">
            <div class="close-btn" id="closeBtn">✕</div>
        </div>

        <div id="img-viewport">
            <img id="big-avatar" src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=800&q=80" draggable="false">
        </div>
    </div>
</div>

<script>
    const avatarTrigger = document.getElementById('avatarTrigger');
    const overlay = document.getElementById('overlay');
    const phone = document.getElementById('phone');
    const bigAvatar = document.getElementById('big-avatar');
    const viewport = document.getElementById('img-viewport');
    const closeBtn = document.getElementById('closeBtn');

    // 缩放变量
    let scale = 1;
    let startDistance = 0;
    let initialScale = 1;

    // 1. 点开头像
    avatarTrigger.addEventListener('click', () => {
        scale = 1; // 重置缩放
        bigAvatar.style.transform = `scale(${scale})`;
        overlay.style.display = 'flex';
    });

    // 2. 核心手势逻辑：双指缩放 (已删除长按计时器)
    viewport.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            // 双指模式：计算初始距离
            startDistance = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            initialScale = scale;
        }
    });

    viewport.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
            // 实时缩放计算
            const currentDistance = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            scale = initialScale * (currentDistance / startDistance);
            
            // 限制缩放范围
            if (scale < 1) scale = 1; 
            if (scale > 4) scale = 4;
            
            bigAvatar.style.transform = `scale(${scale})`;
        }
    });

    // 3. 退出逻辑
    const exitFullView = () => {
        overlay.style.display = 'none';
        scale = 1;
    };

    // 点击关闭按钮退出
    closeBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // 防止冒泡到overlay
        exitFullView();
    });

    // 点击背景或图片退出（在非缩放状态下）
    overlay.addEventListener('click', (e) => {
        // 如果点击的是导航栏或按钮本身，不在此处理
        if (e.target.closest('.viewer-nav')) return;
        
        // 允许点击大图区域退出
        exitFullView();
    });

</script>

</body>
</html>
