<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>头像大图交互 Demo</title>
    <style>
        :root {
            --bg-color: #f8f4f2;
            --card-bg: #ffffff;
            --text-sub: #8e8e8e;
            --accent: #fdf2e9;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #e5e5e5;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
            /* 必须：禁止系统默认菜单，确保自定义长按生效 */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none; /* 交由JS处理手势 */
        }

        .phone-emulator {
            width: 375px; height: 812px;
            background-color: var(--bg-color);
            position: relative;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            overflow: hidden;
            border: 8px solid #333;
        }

        .status-bar { height: 44px; display: flex; justify-content: space-between; padding: 0 30px; align-items: center; font-size: 14px; font-weight: 600; }
        .back-icon { padding: 15px 20px; font-size: 20px; cursor: pointer; }

        .profile-card {
            background: var(--card-bg);
            margin: 60px 20px 20px;
            border-radius: 24px;
            padding: 1px 20px 20px;
            text-align: center;
        }

        .avatar-container {
            width: 100px; height: 100px;
            background: #fff;
            border-radius: 30px;
            margin: -50px auto 15px;
            overflow: hidden;
            border: 4px solid white;
            cursor: pointer;
        }
        .avatar-container img { width: 100%; height: 100%; object-fit: cover; }

        .info h2 { margin: 5px 0; font-size: 22px; }
        .info p { color: var(--text-sub); margin-bottom: 25px; font-size: 14px; }

        .actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 10px; }
        .btn { background: var(--accent); border-radius: 18px; padding: 14px 0; font-size: 12px; color: #5d3a1a; font-weight: bold; text-align: center; }

        .menu-list { margin-top: 15px; text-align: left; padding: 0 5px; }
        .menu-item { padding: 16px 0; border-bottom: 1px solid #f5f5f5; display: flex; align-items: center; gap: 12px; font-size: 16px; color: #333; }
        .menu-item:last-child { border: none; }
        .menu-item i { font-style: normal; font-size: 18px; }

        /* --- 大图遮罩层 --- */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 100;
            overflow: hidden;
        }

        /* 大图图片容器 - 用于承载缩放变换 */
        #img-viewport {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: none; /* 实时手势无需动画，避免卡顿 */
        }

        #big-avatar {
            width: 100%;
            max-width: 375px;
            transform: scale(1);
            will-change: transform;
        }

        /* --- 长按保存菜单 --- */
        #save-menu {
            position: absolute; bottom: -220px; left: 0; width: 100%;
            padding: 20px; box-sizing: border-box;
            transition: bottom 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 101;
            pointer-events: none;
        }
        .show-menu #save-menu { bottom: 20px; pointer-events: auto; }
        .menu-content { background: white; border-radius: 15px; overflow: hidden; }
        .pop-btn { padding: 18px; text-align: center; font-size: 17px; color: #007aff; border-bottom: 1px solid #eee; cursor: pointer; }
        .pop-btn.cancel { font-weight: bold; color: #ff3b30; border: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="phone-emulator" id="phone">
    <div class="status-bar"><span>11:03</span><span>📶 🔋</span></div>
    <div class="back-icon"> 〈 </div>

    <div class="profile-card">
        <div class="avatar-container" id="avatarTrigger">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=xxx" alt="avatar">
        </div>
        <div class="info">
            <h2>xxx</h2>
            <p>@xxx</p>
        </div>
        <div class="actions">
            <div class="btn">🔔 静音</div>
            <div class="btn">📌 置顶</div>
            <div class="btn">🔍 搜索</div>
            <div class="btn">💬 聊天</div>
        </div>

        <div class="menu-list">
            <div class="menu-item"><i>🗑️</i> 清空聊天记录</div>
            <div class="menu-item"><i>🚫</i> 拉黑</div>
            <div class="menu-item"><i>💬</i> 举报</div>
            <div class="menu-item"><i>👤</i> 添加联系人</div>
        </div>
    </div>

    <!-- 交互层 -->
    <div id="overlay">
        <div id="img-viewport">
            <img id="big-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=xxx" draggable="false">
        </div>
        <div id="save-menu">
            <div class="menu-content">
                <div class="pop-btn" onclick="confirmSave(event)">保存图片</div>
                <div class="pop-btn cancel">取消</div>
            </div>
        </div>
    </div>
</div>

<script>
    const avatarTrigger = document.getElementById('avatarTrigger');
    const overlay = document.getElementById('overlay');
    const phone = document.getElementById('phone');
    const bigAvatar = document.getElementById('big-avatar');
    const viewport = document.getElementById('img-viewport');

    let timer = null;
    let isLongPressActive = false;
    
    // 缩放变量
    let scale = 1;
    let startDistance = 0;
    let initialScale = 1;

    // 1. 点开头像
    avatarTrigger.addEventListener('click', () => {
        scale = 1; // 重置缩放
        bigAvatar.style.transform = `scale(${scale})`;
        overlay.style.display = 'flex';
    });

    // 2. 核心手势逻辑：双指缩放 + 长按
    viewport.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            // 双指模式：计算初始距离
            clearTimeout(timer); // 缩放时取消长按计时
            startDistance = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            initialScale = scale;
        } else if (e.touches.length === 1) {
            // 单指模式：启动长按计时
            isLongPressActive = false;
            timer = setTimeout(() => {
                isLongPressActive = true; 
                phone.classList.add('show-menu');
            }, 600);
        }
    });

    viewport.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
            // 实时缩放计算
            const currentDistance = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            scale = initialScale * (currentDistance / startDistance);
            
            // 限制缩放范围
            if (scale < 1) scale = 1; 
            if (scale > 4) scale = 4;
            
            bigAvatar.style.transform = `scale(${scale})`;
        } else {
            // 移动手指则取消长按
            clearTimeout(timer);
        }
    });

    viewport.addEventListener('touchend', (e) => {
        clearTimeout(timer);
    });

    // 3. 点击取消逻辑（分层逻辑）
    overlay.addEventListener('click', (e) => {
        // 如果是长按松手，拦截
        if (isLongPressActive) {
            isLongPressActive = false;
            return;
        }

        // 如果菜单开着，仅关菜单
        if (phone.classList.contains('show-menu')) {
            phone.classList.remove('show-menu');
            return;
        }

        // 正常点击，退出大图
        overlay.style.display = 'none';
    });

    function confirmSave(e) {
        e.stopPropagation();
        alert("已保存到系统相册");
        phone.classList.remove('show-menu');
        isLongPressActive = false;
    }

    // 适配PC测试
    viewport.addEventListener('mousedown', () => {
        timer = setTimeout(() => {
            isLongPressActive = true;
            phone.classList.add('show-menu');
        }, 600);
    });
    viewport.addEventListener('mouseup', () => clearTimeout(timer));
</script>

</body>
</html>
